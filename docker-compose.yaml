services:
  pg_db_mlflow:
    image: postgres:17-alpine3.22
    ports:
      - "${PG_MLFLOW_PORT_EXPOSE}:${PG_MLFLOW_PORT_SERVICE}"
    environment:
      POSTGRES_USER: ${PG_MLFLOW_USER}
      POSTGRES_PASSWORD: ${PG_MLFLOW_PASSWORD}
      POSTGRES_DB: ${PG_MLFLOW_DATABASE}
    volumes:
      - pg_mlflow_db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-p", "5432", "-U", "${PG_MLFLOW_USER}"]
      interval: 5s
      timeout: 5s
      retries: 3
    networks:
      - mlflow_experiments
    restart: always
  
  minio3:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    ports:
      - "${S3_PORT_EXPOSE}:${S3_PORT_SERVICE}"
      - "${UI_PORT_EXPOSE}:${UI_PORT_SERVICE}"
    environment:
      - MINIO_ROOT_USER=${MINIO_ROOT_USER}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD}
    volumes:
      - minio3_storage:/data
    command: server /data --console-address ':9001' --address ':9000'
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
    networks:
      - mlflow_experiments
    restart: always

  minio3_setup:
    image: minio/mc:latest
    container_name: minio3_setup
    depends_on:
      - minio3
    networks:
      - mlflow_experiments
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    entrypoint: ["/bin/sh", "-c"]
    command: 
      - |
        until mc alias set myminio http://minio3:${S3_PORT_SERVICE} ${MINIO_ROOT_USER} ${MINIO_ROOT_PASSWORD}; do
          echo "Waiting for MinIO..."
          sleep 2
        done
        mc admin user svcacct add --access-key ${MLFLOW_ACCESS_KEY_ID} --secret-key ${AWS_SECRET_ACCESS_KEY} myminio ${MINIO_ROOT_USER} || true
        mc mb myminio/${MLFLOW_BUCKET_NAME} || true
        mc mb myminio/${MLFLOW_BUCKET_NAME}/artifacts || true

        echo "MinIO setup finished!"
        exit 0
    restart: no

  mlflow:
    build: ./mlflow_cont
    container_name: mlflow
    ports:
      - "${MLFLOW_PORT_EXPOSE}:${MLFLOW_PORT_SERVICE}"
    environment:
      AWS_ACCESS_KEY_ID: ${MLFLOW_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      MLFLOW_S3_ENDPOINT_URL: http://minio3:${S3_PORT_SERVICE}
    volumes:
      - mlflow_volume:/experiments
    command: >
      mlflow server
      --backend-store-uri postgresql://${PG_MLFLOW_USER}:${PG_MLFLOW_PASSWORD}@pg_db_mlflow:${PG_MLFLOW_PORT_SERVICE}/${PG_MLFLOW_DATABASE}
      --host 0.0.0.0
      --serve-artifacts
      --artifacts-destination s3://${MLFLOW_BUCKET_NAME}/artifacts
    depends_on:
      - pg_db_mlflow
      - minio3
    networks:
      - mlflow_experiments
    restart: always
  
  prometheus:
    container_name: prometheus
    image:
    ports:
      - "${PROMETHEUS_PORT_EXPOSE}:${PROMETHEUS_PORT_SERVICE}"
    volumes:
      - prometheus_valume/
    restart: always

networks:
  mlflow_experiments:
    driver: bridge

volumes:
  mlflow_volume:
  pg_mlflow_db:
  minio3_storage:
  prometheus_valume: